################################# Default configuration ###################
baseURL = "https://www.wisslmedia.com"
title = "WisslMedia"
theme = "meghna"
# post pagination
[pagination]
  pagerSize = 6

# post excerpt
summaryLength = "15"
# disqus short name
disqusShortname = "" # get your shortname form here : https://disqus.com
# disable language
# disableLanguages = ["en-us"]
defaultContentLanguage = "fr"

############################# Plugins ##########################
# css plugins
[[params.plugins.css]]
