############################# Default Parameters ##########################
[params]
logo = "images/logo.png"
# Meta data
description = "Gamifiez, boostez l’engagement et monétisez votre audience"
author = "WisslMedia"
# Google Analitycs
googleAnalitycsID = "UA-90139151-8"
# post share
postShare = true

# preloader
[params.preloader]
enable = true
preloader = "images/logo.png"

